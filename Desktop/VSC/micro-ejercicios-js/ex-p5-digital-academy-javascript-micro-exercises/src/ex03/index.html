<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 3 - Mayor de tres números</title>
</head>
<body>
    <main>
        <h1> Encontrar el número mayor</h1>
        <form id="compareForm">
            <section>
                <label for="inputA">Número A</label>
                <input type="number" id = "inputA" required/>
            </section>
            <section>
                <label for="inputB">Número B</label>
                <input type="number" id = "inputB" required/>
            </section>
            <section>
                <label for="inputC">Número C</label>
                <input type="number" id = "inputC" required/>
            </section>
            <button type="submit" id="botonCalcular">Calcular mayor</button>
    </form>

    <h2 id="resultado"></h2>
    </main>

    <script src="app.js"></script>
</body>
</html>
